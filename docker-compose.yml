# Dev-/Test-Umgebung Klarwerk. Reproduzierbar, vom Agenten beschreibbar.
# Start: docker compose up -d
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: klarwerk
      POSTGRES_PASSWORD: klarwerk_dev
      POSTGRES_DB: klarwerk
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klarwerk"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    ports: ["5678:5678"]
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: Europe/Berlin
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows

volumes:
  n8n_data:
